apiVersion: apps/v1
kind: Deployment

metadata:
  name: notes-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notes-api

  template:
    metadata:
      labels:
        app: notes-api

    spec:
      containers:
        - name: notes-api

          image: yobroyo7/notes-api:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8000
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: notes-config
                  key: DATABASE_URL

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: notes-secret
                  key: SECRET_KEY

            - name: ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: notes-config
                  key: ALGORITHM

            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: notes-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES